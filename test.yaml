# 状态持久化 → cache.db
profile:
  store-selected: true   # 保留策略组选中节点
  store-fake-ip: true    # 保留 fake-IP 映射

mode: rule
tcp-concurrent: true

dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - rule-set:fakeip-filter
  default-nameserver:   # 纯 IP，引导解析 DoH 域名
    - 119.29.29.29
    - 223.5.5.5
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query

# Loyalsoldier clash-rules
# 参考：https://github.com/Loyalsoldier/clash-rules

rule-providers:
  # fake-ip 过滤
  fakeip-filter:
    type: http
    behavior: domain
    format: text
    url: "https://raw.githubusercontent.com/juewuy/ShellCrash/dev/public/fake_ip_filter.list"
    path: ./ruleset/fakeip-filter.list
    interval: 86400

  reject:
    type: http
    behavior: domain
    format: yaml
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/reject.txt"
    path: ./ruleset/loyalsoldier/reject.yaml
    interval: 86400

  private:
    type: http
    behavior: domain
    format: yaml
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/private.txt"
    path: ./ruleset/loyalsoldier/private.yaml
    interval: 86400

  apple:
    type: http
    behavior: domain
    format: yaml
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/apple.txt"
    path: ./ruleset/loyalsoldier/apple.yaml
    interval: 86400

  icloud:
    type: http
    behavior: domain
    format: yaml
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/icloud.txt"
    path: ./ruleset/loyalsoldier/icloud.yaml
    interval: 86400

  google:
    type: http
    behavior: domain
    format: yaml
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/google.txt"
    path: ./ruleset/loyalsoldier/google.yaml
    interval: 86400

  proxy:
    type: http
    behavior: domain
    format: yaml
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/proxy.txt"
    path: ./ruleset/loyalsoldier/proxy.yaml
    interval: 86400

  direct:
    type: http
    behavior: domain
    format: yaml
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/direct.txt"
    path: ./ruleset/loyalsoldier/direct.yaml
    interval: 86400

  telegramcidr:
    type: http
    behavior: ipcidr
    format: yaml
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/telegramcidr.txt"
    path: ./ruleset/loyalsoldier/telegramcidr.yaml
    interval: 86400

  cncidr:
    type: http
    behavior: ipcidr
    format: yaml
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/cncidr.txt"
    path: ./ruleset/loyalsoldier/cncidr.yaml
    interval: 86400

  lancidr:
    type: http
    behavior: ipcidr
    format: yaml
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/lancidr.txt"
    path: ./ruleset/loyalsoldier/lancidr.yaml
    interval: 86400

  applications:
    type: http
    behavior: classical
    format: yaml
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/applications.txt"
    path: ./ruleset/loyalsoldier/applications.yaml
    interval: 86400

rules:
  # 自定义
  # 自定义直连
  - DOMAIN-SUFFIX,ccalm.xyz,DIRECT
  - DOMAIN-SUFFIX,lichidental.com,DIRECT
  - DOMAIN-SUFFIX,yutoons.com,DIRECT
  - DOMAIN-SUFFIX,mmm920.com,DIRECT
  # 自建服务器 IP
  - IP-CIDR,38.55.195.82/32,DIRECT,no-resolve
  - IP-CIDR,38.55.96.234/32,DIRECT,no-resolve
  - IP-CIDR,198.46.175.234/32,DIRECT,no-resolve

  # 自定义代理
  - DOMAIN-SUFFIX,store.bblcdn.com,香港节点
  - DOMAIN-SUFFIX,iyf.tv,香港节点

  # Loyalsoldier 白名单模式
  - RULE-SET,applications,DIRECT
  - RULE-SET,private,DIRECT
  - RULE-SET,reject,REJECT
  - RULE-SET,icloud,DIRECT
  - RULE-SET,apple,DIRECT
  - RULE-SET,google,手动选择
  - RULE-SET,proxy,手动选择
  - RULE-SET,direct,DIRECT
  - RULE-SET,lancidr,DIRECT,no-resolve
  - RULE-SET,cncidr,DIRECT,no-resolve
  - RULE-SET,telegramcidr,手动选择,no-resolve
  - GEOIP,CN,DIRECT,no-resolve
  - MATCH,漏网之鱼

proxy-groups:
  - name: 手动选择
    type: select
    proxies:
      - 香港节点
      - 美国节点
  - name: 漏网之鱼
    type: select
    proxies:
      - 香港节点
      - 美国节点
      - DIRECT
  - name: 香港节点
    type: url-test
    include-all-proxies: true
    filter: '香港'
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50
  - name: 美国节点
    type: url-test
    include-all-proxies: true
    filter: '美国'
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50
