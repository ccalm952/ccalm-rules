# 状态持久化 → cache.db
profile:
  store-selected: true   # 保留策略组选中节点
  store-fake-ip: true    # 保留 fake-IP 映射

mode: rule
tcp-concurrent: true

dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - rule-set:fakeip-filter
  default-nameserver:   # 纯 IP，引导解析 DoH 域名
    - 119.29.29.29
    - 223.5.5.5
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query

# Loyalsoldier clash-rules（黑名单模式：未命中则直连）
# 参考：https://github.com/Loyalsoldier/clash-rules

rule-providers:
  # fake-ip 过滤（ShellCrash 维护）
  fakeip-filter:
    type: http
    behavior: domain
    format: text
    url: "https://raw.githubusercontent.com/juewuy/ShellCrash/dev/public/fake_ip_filter.list"
    path: ./ruleset/fakeip-filter.list
    interval: 86400

  reject:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/reject.txt"
    path: ./ruleset/loyalsoldier/reject.yaml
    interval: 86400

  private:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/private.txt"
    path: ./ruleset/loyalsoldier/private.yaml
    interval: 86400

  apple:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/apple.txt"
    path: ./ruleset/loyalsoldier/apple.yaml
    interval: 86400

  icloud:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/icloud.txt"
    path: ./ruleset/loyalsoldier/icloud.yaml
    interval: 86400

  google:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/google.txt"
    path: ./ruleset/loyalsoldier/google.yaml
    interval: 86400

  proxy:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/proxy.txt"
    path: ./ruleset/loyalsoldier/proxy.yaml
    interval: 86400

  direct:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/direct.txt"
    path: ./ruleset/loyalsoldier/direct.yaml
    interval: 86400

  gfw:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/gfw.txt"
    path: ./ruleset/loyalsoldier/gfw.yaml
    interval: 86400

  tld-not-cn:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/tld-not-cn.txt"
    path: ./ruleset/loyalsoldier/tld-not-cn.yaml
    interval: 86400

  telegramcidr:
    type: http
    behavior: ipcidr
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/telegramcidr.txt"
    path: ./ruleset/loyalsoldier/telegramcidr.yaml
    interval: 86400

  cncidr:
    type: http
    behavior: ipcidr
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/cncidr.txt"
    path: ./ruleset/loyalsoldier/cncidr.yaml
    interval: 86400

  lancidr:
    type: http
    behavior: ipcidr
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/lancidr.txt"
    path: ./ruleset/loyalsoldier/lancidr.yaml
    interval: 86400

  applications:
    type: http
    behavior: classical
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/applications.txt"
    path: ./ruleset/loyalsoldier/applications.yaml
    interval: 86400

rules:
  # 自定义（由 rules-web/ 管理页维护）
  # 自定义直连
  - DOMAIN-SUFFIX,ccalm.xyz,DIRECT
  - DOMAIN-SUFFIX,lichidental.com,DIRECT
  - DOMAIN-SUFFIX,yutoons.com,DIRECT
  - DOMAIN-SUFFIX,mmm920.com,DIRECT

  # 自定义代理
  - DOMAIN-SUFFIX,store.bblcdn.com,香港节点
  - DOMAIN-SUFFIX,iyf.tv,香港节点

  # Cursor / AI（Loyalsoldier 未单独拆出，按日志补强）
  - DOMAIN-SUFFIX,cursor.sh,AI
  - DOMAIN-SUFFIX,cursor.com,AI
  - DOMAIN-SUFFIX,cursorapi.com,AI
  - DOMAIN-SUFFIX,cursorvm.com,AI
  - DOMAIN-SUFFIX,openai.com,AI
  - DOMAIN-SUFFIX,chatgpt.com,AI
  - DOMAIN-SUFFIX,anthropic.com,AI
  - DOMAIN-SUFFIX,claude.ai,AI

  # 国外媒体（从通用 proxy 中提前分流）
  - DOMAIN-SUFFIX,youtube.com,国外媒体
  - DOMAIN-SUFFIX,googlevideo.com,国外媒体
  - DOMAIN-SUFFIX,ytimg.com,国外媒体
  - DOMAIN-SUFFIX,ggpht.com,国外媒体
  - DOMAIN-SUFFIX,netflix.com,国外媒体
  - DOMAIN-SUFFIX,nflxvideo.net,国外媒体
  - DOMAIN-SUFFIX,spotify.com,国外媒体
  - DOMAIN-SUFFIX,disneyplus.com,国外媒体

  # 微软服务（可选手动/直连）
  - DOMAIN-SUFFIX,microsoft.com,微软服务
  - DOMAIN-SUFFIX,microsoftonline.com,微软服务
  - DOMAIN-SUFFIX,msn.com,微软服务
  - DOMAIN-SUFFIX,live.com,微软服务
  - DOMAIN-SUFFIX,office.com,微软服务
  - DOMAIN-SUFFIX,office.net,微软服务
  - DOMAIN-SUFFIX,windows.com,微软服务
  - DOMAIN-SUFFIX,windowsupdate.com,微软服务
  - DOMAIN-SUFFIX,xbox.com,微软服务
  - DOMAIN-SUFFIX,xboxlive.com,微软服务

  # Loyalsoldier（黑名单模式）
  - RULE-SET,applications,DIRECT
  - RULE-SET,private,DIRECT
  - RULE-SET,reject,REJECT
  - RULE-SET,icloud,DIRECT
  - RULE-SET,apple,DIRECT
  - RULE-SET,google,DIRECT
  - RULE-SET,tld-not-cn,手动选择
  - RULE-SET,gfw,手动选择
  - RULE-SET,proxy,手动选择
  - RULE-SET,direct,DIRECT
  - RULE-SET,lancidr,DIRECT,no-resolve
  - RULE-SET,cncidr,DIRECT,no-resolve
  - RULE-SET,telegramcidr,手动选择,no-resolve
  - GEOIP,LAN,DIRECT,no-resolve
  - GEOIP,CN,DIRECT,no-resolve
  - MATCH,漏网之鱼

proxy-groups:
  - name: 手动选择
    type: select
    proxies:
      - 香港节点
      - 美国节点
  - name: 微软服务
    type: select
    proxies:
      - DIRECT
      - 香港节点
      - 美国节点
      - 手动选择
  - name: AI
    type: select
    proxies:
      - 美国节点
      - 香港节点
      - DIRECT
  - name: 国外媒体
    type: select
    proxies:
      - 香港节点
      - 美国节点
      - DIRECT
  - name: 漏网之鱼
    type: select
    proxies:
      - DIRECT
      - 香港节点
      - 美国节点
  - name: 香港节点
    type: url-test
    include-all-proxies: true
    filter: '香港'
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50
  - name: 美国节点
    type: url-test
    include-all-proxies: true
    filter: '美国'
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50
